<!DOCTYPE html>
<html lang="en">
<head>

<title>#claude-code-gang</title>
<link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

      <h1>#claude-code-gang</h1>

    </div>
  </div>

  <div id="app" hidden></div>

  <script src="config.js?v=2"></script>
  <script src="gang.js?v=2"></script>

</html>
