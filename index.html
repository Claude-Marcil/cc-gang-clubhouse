<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>#claude-code-gang</title>
<style>
:root{
  --bg:#0d0f12; --panel:#14171c; --panel2:#1a1e25; --edge:#262b34;
  --ink:#d7dde5; --dim:#7b8694; --orange:#ff7a45; --green:#6ee7a8;
}
*{ box-sizing:border-box; }
/* CRITICAL: an author rule like `.gate{display:grid}` or `#app{display:flex}` outranks the
   browser's built-in `[hidden]{display:none}` (author origin beats UA origin), so toggling
   the `hidden` attribute in JS would NOT hide these. This makes `hidden` actually hide —
   without it, the gate overlay never lifts and every button looks dead. Do not remove. */
[hidden]{ display:none !important; }
html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
  font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace; }

/* ---- members-only gate ---- */
.gate{ position:fixed; inset:0; display:grid; place-items:center;
  background:radial-gradient(1200px 600px at 50% -10%, #1b130c, #0d0f12); z-index:50; padding:20px; }
.gate-card{ width:100%; max-width:340px; background:var(--panel); border:1px solid var(--edge);
  border-radius:16px; padding:26px 22px; text-align:center; box-shadow:0 20px 60px #0008; }
.gate-card h1{ font-size:18px; margin:14px 0 2px; }
.gate-card p{ color:var(--dim); font-size:12px; margin:0 0 16px; letter-spacing:.5px; }
.gate-card select, .gate-card input{ width:100%; margin:7px 0; padding:11px 12px; font:inherit;
  font-size:13px; background:#0a0c0f; color:var(--ink); border:1px solid var(--edge); border-radius:10px; }
.gate-card button{ width:100%; margin-top:12px; padding:12px; font:inherit; font-weight:700;
  background:var(--orange); color:#1a0f08; border:0; border-radius:10px; cursor:pointer; }
.gate-card .err{ color:#ff7a7a; margin-top:10px; }

/* ---- app shell ---- */
#app{ display:flex; flex-direction:column; height:100%; max-width:1100px; margin:0 auto; }
header{ display:flex; align-items:center; gap:10px; padding:12px 16px;
  background:linear-gradient(180deg,#161a20,#10131890); border-bottom:1px solid var(--edge); }
.logo{ width:34px;height:34px;border-radius:8px; background:var(--orange);
  display:grid;place-items:center; font-weight:800; color:#1a0f08;
  box-shadow:0 0 0 2px #2a2017, 0 0 18px #ff7a4544; }
header h1{ font-size:15px; margin:0; }
header .topic{ color:var(--dim); font-size:11px; margin-top:2px; }

.body-row{ display:flex; flex:1; min-height:0; }
.chan{ flex:1; display:flex; flex-direction:column; min-width:0; }
.log{ flex:1; overflow-y:auto; padding:14px 16px; font-size:13px; line-height:1.65; }
.line{ white-space:pre-wrap; word-break:break-word; padding:1px 0; }
.ts{ color:#4d5563; margin-right:8px; }
.nick{ font-weight:700; margin-right:7px; }
.botnick{ color:#1a0f08; background:var(--orange); padding:0 6px; border-radius:4px; }
.body code{ background:#000; color:#ffb27a; padding:1px 5px; border-radius:4px; font-size:12px; }
.body b{ color:#fff; }
.line.sys{ color:#566; text-align:center; font-size:11px; margin:6px 0; }
.line.act{ color:#c89; font-style:italic; }

.composer{ display:flex; gap:8px; padding:10px 14px; border-top:1px solid var(--edge); background:var(--panel); }
.composer input{ flex:1; background:#0a0c0f; border:1px solid var(--edge); color:var(--ink);
  border-radius:8px; padding:11px 13px; font:inherit; font-size:13px; }
.composer button{ background:var(--orange); color:#1a0f08; border:0; border-radius:8px;
  padding:0 16px; font:inherit; font-weight:700; cursor:pointer; }

/* ---- buddy list ---- */
aside{ width:210px; background:var(--panel); border-left:1px solid var(--edge); padding:10px; overflow-y:auto; }
aside h2{ font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin:6px 4px 10px; }
aside ul{ list-style:none; margin:0; padding:0; }
aside li{ display:flex; align-items:center; gap:8px; padding:6px 6px; border-radius:8px; font-size:13px; }
aside li:hover{ background:var(--panel2); }
aside li.off{ opacity:.4; }
.av{ width:26px; height:26px; border-radius:6px; background:#0a0c0f; image-rendering:pixelated; object-fit:contain; padding:1px; }
.botav{ width:26px;height:26px;border-radius:6px;display:grid;place-items:center;
  background:var(--orange); color:#1a0f08; font-weight:800; box-shadow:0 0 12px #ff7a4555; }
aside li.bot{ background:#1d160f; margin-bottom:8px; }
.dot{ width:8px;height:8px;border-radius:50%;display:inline-block; }
.dot.online{ background:var(--green); box-shadow:0 0 6px var(--green); }
.dot.idle{ background:#566; }
.op{ color:var(--green); width:8px; margin-right:-4px; }
.real{ color:#566; font-size:10px; margin-left:auto; }
.tag{ font-size:9px; background:#000; color:#ffb27a; padding:1px 5px; border-radius:4px; margin-left:auto; }

/* ---- mobile ---- */
@media (max-width:560px){
  aside{ position:fixed; right:0; top:0; bottom:0; transform:translateX(100%);
    transition:transform .2s; z-index:20; box-shadow:-10px 0 40px #0009; }
  aside.show{ transform:translateX(0); }
  .buddybtn{ display:inline-grid; }
}
.buddybtn{ display:none; margin-left:auto; background:none; border:1px solid var(--edge);
  color:var(--ink); border-radius:8px; padding:6px 10px; font:inherit; cursor:pointer; }

.buildtag { position:fixed; bottom:6px; right:8px; z-index:99; font:11px ui-monospace,monospace;
  color:#6ee7a8; background:#000a; padding:2px 7px; border-radius:6px; pointer-events:none; }
</style>
</head>
<body>
  <div id="gate" class="gate">
    <div class="gate-card">
      <div class="logo">3</div>
      <h1>#claude-code-gang</h1>
      <p>members only 🌲 · build 10</p>
      <select id="nickPick" aria-label="Who are you?"></select>
      <input id="passInput" type="password" placeholder="club passcode" autocomplete="off">
      <button id="enterBtn">Enter the clubhouse</button>
      <p id="gateErr" class="err" hidden>nope. try again.</p>
      <button id="skipBtn" style="background:#2a2f38;color:#cbd3dd;margin-top:8px;">skip — just let me in</button>
      <div id="diag" style="margin-top:14px;font:10px ui-monospace,monospace;color:#566;word-break:break-all;">⚠ script did not run</div>
    </div>
  </div>

  <div id="app" hidden></div>

  <div class="buildtag">build 10</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
// ===== config.js =====
// PLACEHOLDER config — the page loads but won't connect until real values are filled in.
// See CONNECT.md (≈5 min). The anon key is public by design; passcode stored only as a hash.
window.CLUBHOUSE_CONFIG = {
  SUPABASE_URL: "https://cavefhuklhkhvviqsjrg.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_ZDaTdOEJE8RTtCurNjWLMg_TKjKZISJ",
  ROOM_SLUG: "claude-code-gang",
  PASSCODE: "treehouse",   // plain compare (no crypto.subtle dependency)
  PASSCODE_HASH: "dc12c22f0cab5fd6943c2870d9b8eaf55902c02ced0519a66cdb96bc47ac698a",
  // n8n webhook that verifies a /knock code server-side. Leave as placeholder to accept
  // any knock from a known nick (velvet rope); set it to turn the door into a real lock.
  KNOCK_VERIFY_URL: "REPLACE_WITH_N8N_KNOCK_VERIFY_URL",
};


// ===== gang.js =====
// The exclusive 5. `nick` is the channel identity; `avatar` is the mascot file.
window.GANG = [
  { nick: "Copeland",  name: "Matt",    color: "#7cc7ff", avatar: "assets/copeland.png",  op: true  },
  { nick: "Weintz",    name: "Brent",   color: "#9d8cff", avatar: "assets/weintz.png",    op: true  },
  { nick: "Marcil",    name: "Mike",    color: "#ff9d6e", avatar: "assets/marcil.png",    op: true  },
  { nick: "Niergarth", name: "Natalie", color: "#6ee7a8", avatar: "assets/niergarth.png", op: false },
  { nick: "Ramsey",    name: "Brooke",  color: "#f5d76e", avatar: "assets/ramsey.png",    op: false },
];
window.CLAUD3 = { nick: "Claud3", color: "#ff7a45" };


// ===== gate.js =====
// Members-only gate. Light "club door," not hardened auth (no sensitive data lives here).
async function sha256Hex(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}
// Forgiving normalize: trims surrounding whitespace AND any stray inner spaces
// (autocomplete/keyboards can sneak in a trailing space or a leading capital), then
// lowercases. The passcode is a velvet rope, not a credential — being lenient here
// costs nothing and kills the "I typed it right and nothing happened" class of bug.
function normPass(s) { return String(s == null ? "" : s).trim().replace(/\s+/g, "").toLowerCase(); }
async function passcodeOk(entered) {
  // Plain comparison — avoids crypto.subtle (undefined in some contexts) entirely.
  if (window.CLUBHOUSE_CONFIG.PASSCODE != null) {
    return normPass(entered) === normPass(window.CLUBHOUSE_CONFIG.PASSCODE);
  }
  // Fallback to hash if a plain passcode isn't configured.
  try { return (await sha256Hex(normPass(entered))) === window.CLUBHOUSE_CONFIG.PASSCODE_HASH; }
  catch (e) { return false; }
}
window.sha256Hex = sha256Hex;
window.passcodeOk = passcodeOk;


// ===== app.js =====
// Claude Code Gang Clubhouse — frontend app
const $ = (s) => document.querySelector(s);

// Declared up top: /knock auto-entry runs during page load and connects Supabase before
// the section below would otherwise initialize these (temporal-dead-zone bug otherwise).
let sb, channel, ME;
let renderedIds = new Set();   // message-id dedup (kills loadHistory↔realtime race dupes)

// ---- gate ----
GANG.forEach(g => {
  const o = document.createElement("option");
  o.value = g.nick; o.textContent = `${g.nick} (${g.name})`;
  $("#nickPick").appendChild(o);
});
// remember last nick (storage may be unavailable in private mode)
let lastNick = null;
try { lastNick = localStorage.getItem("cc_nick"); } catch (e) {}
if (lastNick) $("#nickPick").value = lastNick;

$("#enterBtn").addEventListener("click", enter);
$("#passInput").addEventListener("keydown", e => { if (e.key === "Enter") enter(); });

// escape hatch — enter with no passcode/crypto/params (works if the page loaded at all)
const _skip = document.querySelector("#skipBtn");
if (_skip) _skip.addEventListener("click", () => {
  const nick = $("#nickPick").value || "Marcil";
  $("#gate").hidden = true; $("#app").hidden = false;
  startClubhouse(nick);
});

// ---- /knock auto-entry (terminal-only door) ----
// If the page was opened by the `/knock` CLI command, it carries #nick=&code=.
// Runs on load AND on hashchange, so /knock works even when the tab is already open.
// Verify server-side (n8n) when configured; otherwise accept any knock from a known nick.
async function tryKnock() {
  if (!$("#app").hidden) return;                    // already inside → nothing to do
  // Read the #fragment FIRST — fragments are never sent to servers (RFC 3986/9110), so a
  // corporate proxy physically cannot strip them (the query string IS stripped on some nets).
  // Fall back to the query string for any direct links that still use it.
  let p = new URLSearchParams(location.hash.slice(1));
  let nick = p.get("nick"), code = p.get("code");
  if (!nick || !code) { p = new URLSearchParams(location.search); nick = p.get("nick"); code = p.get("code"); }
  if (!nick || !code) return;                       // normal visit → show the gate (or broker)
  if (!GANG.find(g => g.nick === nick)) return;     // unknown nick → no entry
  const verifyUrl = window.CLUBHOUSE_CONFIG.KNOCK_VERIFY_URL;
  let ok = !verifyUrl || verifyUrl.startsWith("REPLACE_"); // velvet rope until verifier wired
  if (!ok) {
    try {
      const r = await fetch(verifyUrl, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nick, code }),
      });
      ok = (await r.json())?.ok === true;
    } catch (e) { ok = false; }
  }
  if (!ok) return;                                  // bad knock → fall through to gate
  $("#gate").hidden = true; $("#app").hidden = false;
  startClubhouse(nick);                             // reveal FIRST — never let storage block entry
  try { localStorage.setItem("cc_nick", nick); } catch (e) {}   // Safari Private throws; ignore
  try { history.replaceState(null, "", location.pathname); } catch (e) {}
}
tryKnock();
window.addEventListener("hashchange", tryKnock);

// Broker fallback (opt-in): if the #fragment is ever stripped on this network, /knock also
// writes a short-lived row to a `knock_codes` table and the page polls it — no URL needed.
// Enable by setting KNOCK_BROKER:true in config AFTER creating the table (CONNECT.md §E).
async function checkBroker() {
  if (!$("#app").hidden) return;
  const cfg = window.CLUBHOUSE_CONFIG;
  if (!cfg.KNOCK_BROKER) return;
  try {
    const h = { apikey: cfg.SUPABASE_ANON_KEY, Authorization: "Bearer " + cfg.SUPABASE_ANON_KEY };
    const r = await fetch(`${cfg.SUPABASE_URL}/rest/v1/knock_codes?select=*&order=created_at.desc&limit=1&expires_at=gt.${new Date().toISOString()}`, { headers: h });
    const row = (await r.json())?.[0];
    if (!row || !GANG.find(g => g.nick === row.nick)) return;
    fetch(`${cfg.SUPABASE_URL}/rest/v1/knock_codes?id=eq.${row.id}`, { method: "DELETE", headers: h }).catch(() => {});
    $("#gate").hidden = true; $("#app").hidden = false;
    startClubhouse(row.nick);
    try { localStorage.setItem("cc_nick", row.nick); } catch (e) {}
  } catch (e) {}
}
checkBroker();

// on-screen diagnostics so we can see runtime state without DevTools
try {
  const d = document.querySelector("#diag");
  if (d) d.textContent =
    "search=" + (location.search || "none") +
    " · hash=" + (location.hash || "none") +
    " · crypto=" + !!(window.crypto && window.crypto.subtle) +
    " · supabase=" + (typeof supabase !== "undefined") +
    " · opts=" + document.querySelectorAll("#nickPick option").length;
} catch (e) {}

async function enter() {
  const nick = $("#nickPick").value;
  let ok = false;
  try { ok = await passcodeOk($("#passInput").value); }
  catch (e) {
    // Never let a passcode-check exception silently swallow the click (the old
    // "buttons feel dead" symptom). Surface it and fall through to the error path.
    const d = $("#diag"); if (d) d.textContent = "passcode check threw: " + (e && e.message || e);
  }
  if (!ok) {
    const raw = $("#passInput").value;
    const err = $("#gateErr");
    if (err) {
      err.hidden = false;
      // Loud + diagnostic: a silent mismatch is the thing that wastes everyone's time.
      err.textContent = `nope — passcode didn't match (you entered ${raw.length} char${raw.length === 1 ? "" : "s"}). hit "skip" to come in anyway.`;
    }
    return;
  }
  $("#gate").hidden = true; $("#app").hidden = false;
  startClubhouse(nick);
  try { localStorage.setItem("cc_nick", nick); } catch (e) {}
}

// ---- channel shell ----
function startClubhouse(nick) {
  const me = GANG.find(g => g.nick === nick);
  $("#app").innerHTML = `
    <header>
      <div class="logo">3</div>
      <div>
        <h1>#claude-code-gang</h1>
        <div class="topic">Outstanding Alone. Better Together. · Claud3 is listening 🌲</div>
      </div>
      <button class="buddybtn" id="buddyBtn">buddies</button>
    </header>
    <div class="body-row">
      <div class="chan">
        <div class="log" id="log"></div>
        <div class="composer">
          <input id="msgInput" placeholder="message #claude-code-gang   (try: @Claud3 ...)" autocomplete="off">
          <button id="sendBtn">Send</button>
        </div>
      </div>
      <aside id="buddies"><h2 id="onlineHdr">Online — 0</h2><ul id="nicklist"></ul></aside>
    </div>`;
  $("#buddyBtn").addEventListener("click", () => $("#buddies").classList.toggle("show"));
  renderNicklist(new Set());           // draw roster (all offline) immediately
  renderedIds = new Set();             // fresh dedup set per entry
  connectSupabase(me);
}

// ---- supabase ----
function connectSupabase(me) {
  ME = me;
  sb = supabase.createClient(CLUBHOUSE_CONFIG.SUPABASE_URL, CLUBHOUSE_CONFIG.SUPABASE_ANON_KEY);
  loadHistory().then(subscribeRealtime).catch(showOffline);
  wireComposer();
}
function showOffline() {
  const log = $("#log");
  if (log) log.insertAdjacentHTML("beforeend",
    `<div class="line sys">— can't reach the clubhouse server (check config.js / CONNECT.md) —</div>`);
}

async function loadHistory() {
  const { data, error } = await sb.from("messages").select("*")
    .eq("room", CLUBHOUSE_CONFIG.ROOM_SLUG)
    .order("created_at", { ascending: true }).limit(200);
  if (error) throw error;
  (data || []).forEach(renderRow);
  scrollLog();
}

function subscribeRealtime() {
  channel = sb.channel("room:" + CLUBHOUSE_CONFIG.ROOM_SLUG,
    { config: { presence: { key: ME.nick } } });

  channel.on("postgres_changes",
    { event: "INSERT", schema: "public", table: "messages",
      filter: `room=eq.${CLUBHOUSE_CONFIG.ROOM_SLUG}` },
    (payload) => { renderRow(payload.new); scrollLog(); });

  setupPresence(channel);

  channel.subscribe(async (status) => {
    if (status === "SUBSCRIBED") {
      await channel.track({ nick: ME.nick, at: Date.now() });
    }
  });

  // clean up the realtime channel on exit (avoid leaked connections vs the free-tier cap)
  window.addEventListener("beforeunload", () => { try { sb.removeChannel(channel); } catch (e) {} });
  // re-assert presence when the tab comes back to the foreground (fixes stale presence)
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && channel) {
      try { channel.track({ nick: ME.nick, at: Date.now() }); } catch (e) {}
    }
  });
}

async function sendMessage(body) {
  const isAction = body.startsWith("/me ");
  const kind = isAction ? "act" : "msg";
  const text = isAction ? body.slice(4) : body;
  const { error } = await sb.from("messages").insert(
    { room: CLUBHOUSE_CONFIG.ROOM_SLUG, nick: ME.nick, kind, body: text });
  if (error) showOffline();
}

function wireComposer() {
  const send = () => {
    const v = $("#msgInput").value.trim();
    if (!v) return;
    $("#msgInput").value = "";
    sendMessage(v);
  };
  $("#sendBtn").addEventListener("click", send);
  $("#msgInput").addEventListener("keydown", e => { if (e.key === "Enter") send(); });
}

// ---- presence ----
function setupPresence(ch) {
  ch.on("presence", { event: "sync" }, () => {
    renderNicklist(new Set(Object.keys(ch.presenceState())));
  });
}

function renderNicklist(online) {
  const ul = $("#nicklist");
  if (!ul) return;
  ul.innerHTML = "";
  ul.insertAdjacentHTML("beforeend",
    `<li class="bot"><span class="botav">3</span>Claud3 <span class="tag">bot</span></li>`);
  GANG.forEach(g => {
    const isOn = online.has(g.nick);
    ul.insertAdjacentHTML("beforeend", `
      <li class="${isOn ? '' : 'off'}">
        <img class="av" src="${g.avatar}" alt="${g.nick}">
        <span class="dot ${isOn ? 'online' : 'idle'}"></span>
        <span class="op">${g.op ? '@' : ''}</span>
        <span style="color:${g.color}">${g.nick}</span>
        <span class="real">${g.name}</span>
      </li>`);
  });
  const hdr = $("#onlineHdr");
  if (hdr) hdr.textContent = `Online — ${online.size}`;
}

// ---- rendering ----
function colorFor(nick) {
  const g = GANG.find(x => x.nick === nick);
  return g ? g.color : (nick === CLAUD3.nick ? CLAUD3.color : "#ccc");
}
function esc(s) {
  return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
function scrollLog() { const l = $("#log"); if (l) l.scrollTop = l.scrollHeight; }

function renderRow(m) {
  const log = $("#log");
  if (!log) return;
  if (m.id) { if (renderedIds.has(m.id)) return; renderedIds.add(m.id); }  // dedup
  const div = document.createElement("div");
  const ts = new Date(m.created_at || Date.now())
    .toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  if (m.kind === "sys") {
    div.className = "line sys"; div.textContent = `— ${m.body} —`;
  } else if (m.kind === "act") {
    div.className = "line act";
    div.innerHTML = `* <span style="color:${colorFor(m.nick)}">${esc(m.nick)}</span> ${esc(m.body)}`;
  } else {
    div.className = "line";
    const botCls = m.kind === "bot" ? "botnick" : "";
    const style = m.kind === "bot" ? "" : `style="color:${colorFor(m.nick)}"`;
    div.innerHTML =
      `<span class="ts">${ts}</span>` +
      `<span class="nick ${botCls}" ${style}>&lt;${esc(m.nick)}&gt;</span>` +
      `<span class="body">${esc(m.body)}</span>`;
  }
  log.appendChild(div);
}

  </script>
</body>
</html>
